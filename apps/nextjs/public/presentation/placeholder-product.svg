<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Screenshot placeholder">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a"/>
      <stop offset="50%" style="stop-color:#1a1033"/>
      <stop offset="100%" style="stop-color:#0c1224"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="220" fill="url(#glow)"/>
  <rect x="48" y="48" width="1504" height="804" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="800" y="460" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" font-weight="600">ExpoGraph product screenshot</text>
  <text x="800" y="500" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15">Replace with real capture in /public/presentation/</text>
</svg>
